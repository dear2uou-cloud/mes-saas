<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인</title>
  <style>
    body{ margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial; background:#f6f7fb; }
    .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card{ width:380px; background:#fff; border:1px solid #eaecf0; border-radius:16px; box-shadow:0 1px 2px rgba(16,24,40,.06); padding:18px; }
    h1{ margin:0 0 12px 0; font-size:18px; }
    label{ display:block; font-weight:700; margin:12px 0 6px; color:#344054; }
    input{ width:100%; padding:10px 12px; border:1px solid #eaecf0; border-radius:12px; outline:none; }
    button{ margin-top:14px; width:100%; padding:10px 12px; border:1px solid #eaecf0; border-radius:12px; background:#fff; font-weight:800; cursor:pointer; }
    .muted{ color:#667085; font-size:13px; margin-top:10px; }
    .err{ color:#b42318; font-weight:800; font-size:13px; margin-top:10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>mes 로그인</h1>

      {% if form.errors %}
        <div class="err">아이디/비밀번호를 확인해주세요.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="id_username">아이디</label>
        <input id="id_username" type="text" name="username" required>

        <label for="id_password">비밀번호</label>
        <input id="id_password" type="password" name="password" required>

        <button type="submit">로그인</button>
      </form>
      <a class="muted" href="{% url 'admin_setup' %}">관리자 계정 생성(초기 1회)</a>


      <div class="muted">
        관리자 계정은 admin에서 생성할 수 있습니다.
      </div>
    </div>
  </div>
</body>
</html>
