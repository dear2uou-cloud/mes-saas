<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 - HearOS</title>
  <style>
    :root {
      --apple-bg: #f5f5f7;
      --apple-text: #1d1d1f;
      --apple-text-muted: #86868b;
      --apple-blue: #0066cc;
      --apple-blue-hover: #0077ed;
      --apple-border: rgba(0, 0, 0, 0.08);
      --glass-bg: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.4);
    }

    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Pretendard", "Noto Sans KR", sans-serif; 
      background-color: var(--apple-bg); 
      color: var(--apple-text); 
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Soft ambient background gradients */
    .ambient-bg {
      position: absolute;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
      z-index: 0;
      overflow: hidden;
    }
    .ambient-bg .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: float 20s ease-in-out infinite alternate;
    }
    .ambient-bg .blob-1 { width: 400px; height: 400px; background: #dbeafe; top: -10%; left: -10%; }
    .ambient-bg .blob-2 { width: 500px; height: 500px; background: #e0e7ff; bottom: -20%; right: -10%; animation-delay: -5s; }
    .ambient-bg .blob-3 { width: 300px; height: 300px; background: #f3f4f6; top: 40%; left: 40%; animation-delay: -10s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 24px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      padding: 48px 40px;
      text-align: center;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #0066cc, #3b82f6);
      border-radius: 16px;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
      box-shadow: 0 8px 16px rgba(0, 102, 204, 0.24);
    }

    h1 { margin: 0 0 8px 0; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
    .sub { color: var(--apple-text-muted); font-size: 15px; margin-bottom: 32px; font-weight: 400; line-height: 1.4; }

    form { display: flex; flex-direction: column; gap: 16px; text-align: left; }

    .input-group { position: relative; }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--apple-text-muted);
      margin-bottom: 8px;
      padding-left: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--apple-text);
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .input-group input:focus {
      border-color: var(--apple-blue);
      box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1);
      background: #fff;
    }

    .btn-submit {
      margin-top: 12px;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: var(--apple-blue);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(0, 102, 204, 0.2);
    }
    .btn-submit:hover {
      background: var(--apple-blue-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 102, 204, 0.3);
    }
    .btn-submit:active { transform: translateY(0); }

    .divider {
      height: 1px;
      background: var(--apple-border);
      margin: 32px 0 24px;
    }

    .link-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 14px;
    }
    .link-row a {
      color: var(--apple-blue);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .link-row a:hover { opacity: 0.7; }
    .link-row .muted { color: var(--apple-text-muted); }

    .messages { margin-bottom: 24px; }
    .msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; font-weight: 500; text-align: left; }
    .msg.error { background: #fff0f0; color: #d93025; border: 1px solid #ffdbdb; }
  </style>
</head>
<body>
  <div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="glass-card">
      <div class="brand-logo">H</div>
      <h1>HearOS 시작하기</h1>
      <div class="sub">Apple ID를 입력하듯 부드럽게,<br>당신의 센터 운영을 로그인하세요.</div>

      {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="msg {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      {% if form.errors %}
        <div class="messages"><div class="msg error">아이디 또는 비밀번호가 올바르지 않습니다.</div></div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="input-group">
          <label for="id_username">아이디</label>
          <input id="id_username" type="text" name="username" required autocomplete="username">
        </div>

        <div class="input-group">
          <label for="id_password">비밀번호</label>
          <input id="id_password" type="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit">로그인</button>
      </form>

      <div class="divider"></div>

      <div class="link-row">
        <a href="{% url 'find_id' %}" class="muted">계정 찾기</a>
        <a href="{% url 'signup' %}">새로운 계정 만들기</a>
      </div>
    </div>
  </div>
</body>
</html>
