<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입</title>
  <style>
    *{box-sizing:border-box;}
    body{ margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial; background:#f6f7fb; color:#101828; }
    .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card{ width:100%; max-width:420px; background:#fff; border:1px solid #eaecf0; border-radius:16px; box-shadow:0 1px 2px rgba(16,24,40,.06); padding:18px; }
    h1{ margin:0 0 8px 0; font-size:20px; }
    .sub{ color:#667085; font-size:13px; margin-bottom:14px; }
    label{ display:block; font-weight:700; margin:12px 0 6px; color:#344054; }
    input{ width:100%; padding:10px 12px; border:1px solid #d0d5dd; border-radius:12px; outline:none; background:#fff; }
    button,.btn{ display:inline-flex; align-items:center; justify-content:center; width:100%; margin-top:14px; padding:10px 12px; border:1px solid #d0d5dd; border-radius:12px; background:#fff; color:#101828; font-weight:800; cursor:pointer; text-decoration:none; }
    .btn-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
    .btn-row .btn, .btn-row button{ margin-top:0; }
    .muted-links{ display:grid; gap:8px; margin-top:14px; }
    .muted-links a{ color:#667085; font-size:13px; text-decoration:none; }
    .messages{ display:grid; gap:8px; margin:10px 0; }
    .msg{ padding:10px 12px; border-radius:12px; font-size:13px; font-weight:700; }
    .msg.error{ background:#fef3f2; color:#b42318; border:1px solid #fecdca; }
    .msg.success{ background:#ecfdf3; color:#027a48; border:1px solid #abefc6; }
    .radio-row{ display:flex; gap:16px; margin:8px 0 4px; }
    .radio-row label{ margin:0; font-weight:600; }
    .pill{ display:inline-block; padding:6px 10px; border-radius:999px; background:#f2f4f7; color:#344054; font-size:12px; font-weight:700; margin-top:10px; }
  </style>

</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>회원가입</h1>
      <div class="sub">이메일과 휴대폰번호를 등록하고, 휴대폰 인증 후 가입합니다.</div>

      {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="msg {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="action" value="signup">

        <label for="id_username">아이디</label>
        <input id="id_username" type="text" name="username" value="{{ form_data.username }}" required>

        <label for="id_email">이메일</label>
        <input id="id_email" type="email" name="email" value="{{ form_data.email }}" required>

        <label for="id_phone">휴대폰번호</label>
        <input id="id_phone" type="text" name="phone" value="{{ form_data.phone }}" placeholder="010-1234-5678" maxlength="13" inputmode="numeric" autocomplete="tel" required>

        {% if phone_verified %}
          <div class="pill">휴대폰 인증 완료</div>
        {% else %}
          <div class="btn-row">
            <button type="submit" onclick="this.form.action.value='send_code'">인증번호 받기</button>
            <button type="submit" onclick="this.form.action.value='verify_code'">인증 확인</button>
          </div>
          <label for="id_phone_code">인증번호</label>
          <input id="id_phone_code" type="text" name="phone_code" placeholder="인증번호 입력">
        {% endif %}

        <label for="id_password1">비밀번호</label>
        <input id="id_password1" type="password" name="password1" required>

        <label for="id_password2">비밀번호 확인</label>
        <input id="id_password2" type="password" name="password2" required>

        <button type="submit">가입 완료</button>
      </form>

      <div class="muted-links">
        <a href="{% url 'login' %}">로그인으로 돌아가기</a>
      </div>
    </div>
  </div>
<script>
  document.addEventListener('DOMContentLoaded', function(){
    var phoneInput = document.getElementById('id_phone');
    if(!phoneInput) return;
    phoneInput.addEventListener('input', function(){
      var v = phoneInput.value.replace(/\D/g,'').slice(0,11);
      if(v.length > 7) v = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);
      else if(v.length > 3) v = v.slice(0,3) + '-' + v.slice(3);
      if(phoneInput.value !== v) phoneInput.value = v;
    });
  });
</script>
</body>
</html>
